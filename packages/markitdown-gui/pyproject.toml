[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "markitdown-gui"
dynamic = ["version"]
description = 'Desktop GUI for markitdown — convert files to Markdown with a friendly Material 3 interface'
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = ["markitdown", "markdown", "gui", "flet", "desktop"]
authors = [
  { name = "MarkItDown GUI Contributors" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: Implementation :: CPython",
  "Operating System :: Microsoft :: Windows",
  "Operating System :: MacOS",
  "Topic :: Office/Business",
  "Topic :: Text Processing :: Markup :: Markdown",
]
dependencies = [
  # UI
  "flet>=0.28,<0.29",
  # Storage
  "keyring>=24.0",
  "platformdirs>=4.0",
  "cryptography>=42.0",  # fallback encrypted storage when keyring is unavailable
  # LLM (for image description / OCR)
  "openai>=1.0",
  # Core markitdown — declared from PyPI for portability.
  # In monorepo development, dev_run.{bat,sh} installs the sibling package in
  # editable mode first (overriding this version), so the GUI always picks up
  # local markitdown changes.
  "markitdown[all]>=0.1.6",
]

[project.urls]
Documentation = "https://github.com/microsoft/markitdown#readme"
Issues = "https://github.com/microsoft/markitdown/issues"
Source = "https://github.com/microsoft/markitdown"

[tool.hatch.version]
path = "src/markitdown_gui/__init__.py"

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-mock>=3.12",
]

[tool.hatch.envs.default]
features = ["dev"]

[tool.hatch.envs.hatch-test]
features = ["dev"]
extra-dependencies = [
  "openai",
]

[tool.hatch.build.targets.sdist]
only-include = ["src/markitdown_gui"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
