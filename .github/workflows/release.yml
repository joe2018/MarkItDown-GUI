# Auto-build + publish desktop binaries on tag push.
#
# Trigger: push a tag like `v0.1.0` (matches `v[0-9]+.[0-9]+.[0-9]+`).
# Effect:  build the Flet app for Windows + macOS, attach the resulting
#          executables to a GitHub Release with auto-generated notes.
#
# Required: a repo secret or workflow setting `GH_TOKEN` (the default
# GITHUB_TOKEN is enough — `permissions: contents: write` is granted below).
#
# Local test: tag a commit with `git tag v0.1.0 && git push origin v0.1.0`.

name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    # Allow manual triggering from the Actions tab (useful for first test
    # without tagging). Sets a synthetic version from the workflow run id.

permissions:
  contents: write   # needed to create the release + upload assets

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: MarkItDown-windows
            script: scripts/build_windows.bat
            output_dir: packages/markitdown-gui/dist
          - os: macos-latest
            artifact_name: MarkItDown-macos
            script: scripts/build_macos.sh
            output_dir: packages/markitdown-gui/dist

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pipx install hatch

      - name: Install sibling markitdown + gui
        working-directory: packages/markitdown-gui
        run: |
          pip install -e "../markitdown[all]"
          pip install -e ".[dev]"

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: packages/markitdown-gui
        run: ${{ matrix.script }}
        # The .bat file is invoked via cmd; quote the path so the space in
        # "Program Files" doesn't trip up cmd's parser.
        shell: cmd

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: packages/markitdown-gui
        run: bash ${{ matrix.script }}
        shell: bash

      - name: Package build output
        shell: bash
        run: |
          set -e
          # List whatever was produced so the workflow log shows it.
          echo "Build output under ${{ matrix.output_dir }}:"
          ls -laR "${{ matrix.output_dir }}" || true

          # Zip the produced dir so the Release asset is a single file
          # that's easy to download. The flet-pack default layout is a
          # folder containing MarkItDown(.exe) + supporting files.
          cd "${{ matrix.output_dir }}"
          # Pick the first subdir (e.g. dist/MarkItDown/) and zip it.
          SUBDIR=$(ls -1d */ 2>/dev/null | head -1 | tr -d '/' || true)
          if [ -z "$SUBDIR" ]; then
            echo "[ERROR] no output directory found under ${{ matrix.output_dir }}"
            exit 1
          fi
          echo "Zipping $SUBDIR ..."
          # 7z is preinstalled on both windows-latest and macos-latest runners.
          7z a "${{ matrix.artifact_name }}.zip" "$SUBDIR" > /dev/null
          ls -la "${{ matrix.artifact_name }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_dir }}/${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show what we got
        run: ls -laR artifacts/

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            # workflow_dispatch fallback
            VERSION="dev-${GITHUB_RUN_ID}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MarkItDown ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
